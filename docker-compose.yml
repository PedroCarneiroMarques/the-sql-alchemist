services:
  ollama:
    image: ollama/ollama:latest
    container_name: chab-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chab-streamlit
    ports:
      - "8501:8501"
    environment:
      DATA_PATH: data/flights.csv
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_TIMEOUT: 180
      DEFAULT_MODEL_CHAIN: mistral:7b,phi4:14b,qwen2.5-coder:14b,gemma4:26b,qwen3.6:27b,qwen3.6:35b-a3b,deepseek-r1:8b
      DEFAULT_MODEL_PROFILE: balanced
      MODEL_PROFILE_FAST: mistral:7b
      MODEL_PROFILE_ACCURATE: deepseek-r1:8b,qwen3.6:35b-a3b,qwen3.6:27b,qwen2.5-coder:14b,phi4:14b
      DEFAULT_WATCHDOG_SENSITIVITY: normal
      DEFAULT_DELAY_COST_PER_MINUTE: 50
      DEFAULT_CANCELLATION_COST: 200
      LOG_LEVEL: INFO
      LOG_TO_FILE: "true"
      UI_LOCALE: en
    volumes:
      - ./exports:/app/exports
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "src.health", "--http"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

volumes:
  ollama_data:
